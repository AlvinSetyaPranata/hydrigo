services:
  postgres:
    image: postgres:14-alpine
    container_name: hydrigo-postgres
    user: "0:0"
    env_file:
      - ./backend/.env
    volumes:
      - hydrigo_postgres_data:/var/lib/postgresql/data
      - ./pg-config-restore/mnt/vps/etc/postgresql/14/main:/etc/postgresql/14/main:ro
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - >
        mkdir -p /tmp/pgconfig &&
        cp -R /etc/postgresql/14/main/. /tmp/pgconfig/ &&
        mkdir -p /var/lib/postgresql/data/pg_stat_tmp &&
        printf '%s\n' \
        'local   all             all                                     trust' \
        'host    all             all             127.0.0.1/32            trust' \
        'host    all             all             ::1/128                 trust' \
        'host    all             all             0.0.0.0/0               md5' \
        'host    all             all             ::/0                    md5' \
        > /tmp/pgconfig/pg_hba.conf &&
        chmod -R a+rX /tmp/pgconfig &&
        exec docker-entrypoint.sh postgres
        -D /var/lib/postgresql/data
        -c config_file=/tmp/pgconfig/postgresql.conf
        -c data_directory=/var/lib/postgresql/data
        -c port=5432
        -c hba_file=/tmp/pgconfig/pg_hba.conf
        -c ident_file=/tmp/pgconfig/pg_ident.conf
        -c stats_temp_directory=/var/lib/postgresql/data/pg_stat_tmp
        -c ssl=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  chain:
    image: ghcr.io/foundry-rs/foundry:stable
    container_name: hydrigo-chain
    command:
      - anvil
      - --host
      - 0.0.0.0
      - --port
      - "8545"
      - --chain-id
      - "31337"
      - --mnemonic
      - test test test test test test test test test test test junk
    ports:
      - "${CHAIN_PORT:-8545}:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://127.0.0.1:8545"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  contract-deployer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hydrigo-contract-deployer
    entrypoint:
      - /contract-deployer-entrypoint.sh
    network_mode: "service:chain"
    env_file:
      - ./backend/.env
    environment:
      ETH_RPC_URL: http://127.0.0.1:8545
      ETH_CHAIN_ID: 31337
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      CONTRACT_DEPLOYMENT_FILE: /shared/deployments/HydrigoAnchor.deploy.json
    depends_on:
      postgres:
        condition: service_healthy
      chain:
        condition: service_healthy
    volumes:
      - hydrigo_shared_deployments:/shared/deployments
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hydrigo-backend
    env_file:
      - ./backend/.env
    environment:
      ETH_RPC_URL: http://host.docker.internal:${CHAIN_PORT:-8545}
      ETH_CHAIN_ID: 31337
      HYDRIGO_DB_ENGINE: postgres
      HYDRIGO_PORT: ${HYDRIGO_PORT:-8000}
      HYDRIGO_WORKERS: ${HYDRIGO_WORKERS:-2}
      HYDRIGO_TIMEOUT: ${HYDRIGO_TIMEOUT:-120}
      POSTGRES_DB: ${POSTGRES_DB:-hydrigo}
      POSTGRES_USER: ${POSTGRES_USER:-hydrigo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: 5432
      CONTRACT_DEPLOYMENT_FILE: /shared/deployments/HydrigoAnchor.deploy.json
      CONTRACT_DEPLOYMENT_WAIT_SECONDS: ${CONTRACT_DEPLOYMENT_WAIT_SECONDS:-90}
    depends_on:
      postgres:
        condition: service_healthy
      chain:
        condition: service_healthy
      contract-deployer:
        condition: service_completed_successfully
    volumes:
      - hydrigo_shared_deployments:/shared/deployments:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    container_name: hydrigo-nginx
    depends_on:
      - backend
      - mosquitto
    ports:
      - "${APP_PORT:-9000}:80"
    volumes:
      - ./docker/nginx/research.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: hydrigo-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./frontend/docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - hydrigo_mosquitto_data:/mosquitto/data
      - hydrigo_mosquitto_log:/mosquitto/log
    restart: unless-stopped

volumes:
  hydrigo_postgres_data:
  hydrigo_mosquitto_data:
  hydrigo_mosquitto_log:
  hydrigo_shared_deployments:
