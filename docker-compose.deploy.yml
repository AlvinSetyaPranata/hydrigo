services:
  postgres:
    image: postgres:16-alpine
    container_name: hydrigo-postgres
    env_file:
      - ./backend/.env
    volumes:
      - hydrigo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  chain:
    image: ghcr.io/foundry-rs/foundry:stable
    container_name: hydrigo-chain
    command:
      - anvil
      - --host
      - 0.0.0.0
      - --port
      - "8545"
      - --chain-id
      - "31337"
      - --mnemonic
      - test test test test test test test test test test test junk
    ports:
      - "${CHAIN_PORT:-8545}:8545"
    restart: unless-stopped

  contract-deployer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hydrigo-contract-deployer
    entrypoint:
      - sh
      - -lc
    env_file:
      - ./backend/.env
    environment:
      ETH_RPC_URL: http://chain:8545
      ETH_CHAIN_ID: 31337
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      CONTRACT_DEPLOYMENT_FILE: /shared/deployments/HydrigoAnchor.deploy.json
    depends_on:
      postgres:
        condition: service_healthy
      chain:
        condition: service_started
    command: >
      until python deploy_contract.py; do
        echo "Retrying contract deployment";
        sleep 3;
      done &&
      mkdir -p /shared/deployments &&
      cp build/HydrigoAnchor.deploy.json /shared/deployments/HydrigoAnchor.deploy.json
    volumes:
      - hydrigo_shared_deployments:/shared/deployments
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hydrigo-backend
    env_file:
      - ./backend/.env
    environment:
      ETH_RPC_URL: http://chain:8545
      ETH_CHAIN_ID: 31337
      HYDRIGO_DB_ENGINE: postgres
      HYDRIGO_PORT: ${HYDRIGO_PORT:-8000}
      HYDRIGO_WORKERS: ${HYDRIGO_WORKERS:-2}
      HYDRIGO_TIMEOUT: ${HYDRIGO_TIMEOUT:-120}
      POSTGRES_DB: ${POSTGRES_DB:-hydrigo}
      POSTGRES_USER: ${POSTGRES_USER:-hydrigo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: 5432
      CONTRACT_DEPLOYMENT_FILE: /shared/deployments/HydrigoAnchor.deploy.json
      CONTRACT_DEPLOYMENT_WAIT_SECONDS: ${CONTRACT_DEPLOYMENT_WAIT_SECONDS:-90}
    depends_on:
      postgres:
        condition: service_healthy
      chain:
        condition: service_started
      contract-deployer:
        condition: service_completed_successfully
    volumes:
      - hydrigo_shared_deployments:/shared/deployments:ro
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: hydrigo-nginx
    depends_on:
      - backend
      - mosquitto
    ports:
      - "${APP_PORT:-9000}:80"
    volumes:
      - ./docker/nginx/research.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: hydrigo-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./frontend/docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - hydrigo_mosquitto_data:/mosquitto/data
      - hydrigo_mosquitto_log:/mosquitto/log
    restart: unless-stopped

volumes:
  hydrigo_postgres_data:
  hydrigo_mosquitto_data:
  hydrigo_mosquitto_log:
  hydrigo_shared_deployments:
