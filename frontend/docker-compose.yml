services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_MQTT_BROKER_URL: ${VITE_MQTT_BROKER_URL:-}
        VITE_MQTT_USERNAME: ${VITE_MQTT_USERNAME:-}
        VITE_MQTT_PASSWORD: ${VITE_MQTT_PASSWORD:-}
        VITE_MQTT_CLIENT_ID: ${VITE_MQTT_CLIENT_ID:-hydrigo-dashboard}
    container_name: hydrigo-frontend
    depends_on:
      - mosquitto
      - api
    ports:
      - "${APP_PORT:-80}:80"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: hydrigo-api
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://hydrigo:hydrigo@postgres:5432/hydrigo
    depends_on:
      - redis
      - postgres
    ports:
      - "${API_PORT:-3001}:3001"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: hydrigo-worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://hydrigo:hydrigo@postgres:5432/hydrigo
      BLOCKCHAIN_RPC_URL: http://chain:8545
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      CONTRACT_DEPLOYMENT_FILE: /shared/deployments/docker.json
    depends_on:
      - redis
      - postgres
      - chain
      - contracts-deployer
    volumes:
      - chain_deployments:/shared/deployments
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hydrigo-redis
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: hydrigo-postgres
    environment:
      POSTGRES_DB: hydrigo
      POSTGRES_USER: hydrigo
      POSTGRES_PASSWORD: hydrigo
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  chain:
    build:
      context: .
      dockerfile: docker/contracts.Dockerfile
    container_name: hydrigo-chain
    environment:
      BLOCKCHAIN_RPC_URL: http://chain:8545
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
    ports:
      - "${CHAIN_PORT:-8545}:8545"
    restart: unless-stopped

  contracts-deployer:
    build:
      context: .
      dockerfile: docker/contracts-deployer.Dockerfile
    container_name: hydrigo-contracts-deployer
    environment:
      BLOCKCHAIN_RPC_URL: http://chain:8545
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
    depends_on:
      - chain
    volumes:
      - chain_deployments:/app/deployments
    restart: "no"

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: hydrigo-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  mosquitto_data:
  mosquitto_log:
  redis_data:
  postgres_data:
  chain_deployments:
